<!DOCTYPE html>
<html>
<head>
    <title>เก็บข้อมูลเลขไทย</title>
</head>
<body style="text-align: center; font-family: sans-serif;">
    <h2>วาดเลขไทยเพื่อเก็บ Data</h2>
    <!-- พื้นดำ เส้นขาว แบบเดียวกับที่ CNN ชอบ -->
    <canvas id="canvas" width="200" height="200" style="border:1px solid #000; background-color: black;"></canvas>
    <br><br>
    <button onclick="clearCanvas()">เคลียร์ (Clear)</button>
    <button onclick="saveImage()">เซฟรูป (Save)</button>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let painting = false;

        // เติมพื้นหลังสีดำให้สมบูรณ์
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        function startDraw(e) { painting = true; draw(e); }
        function stopDraw() { painting = false; ctx.beginPath(); }
        function draw(e) {
            if (!painting) return;
            ctx.lineWidth = 15;
            ctx.lineCap = 'round';
            ctx.strokeStyle = 'white'; // ลายเส้นสีขาว
            const rect = canvas.getBoundingClientRect();
            ctx.lineTo(e.clientX - rect.left, e.clientY - rect.top);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(e.clientX - rect.left, e.clientY - rect.top);
        }

        canvas.addEventListener('mousedown', startDraw);
        canvas.addEventListener('mouseup', stopDraw);
        canvas.addEventListener('mousemove', draw);

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function saveImage() {
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = 28; tempCanvas.height = 28;
            const tCtx = tempCanvas.getContext('2d');
            tCtx.drawImage(canvas, 0, 0, 28, 28); // ย่อเป็น 28x28
            const link = document.createElement('a');
            link.download = `num_${Date.now()}.png`;
            link.href = tempCanvas.toDataURL('image/png');
            link.click();
            clearCanvas();
        }
    </script>
</body>
</html>
